services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: water_dis
      POSTGRES_USER: water_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U water_user -d water_dis"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    command: python run_bot.py
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    env_file: .env
    environment:
      DATABASE_URL: postgresql://water_user:${DB_PASSWORD:-changeme}@db:5432/water_dis
    volumes:
      - bot_persistence:/app/bot_persistence
      - logs:/app/logs

  web:
    build: .
    restart: unless-stopped
    command: gunicorn -c gunicorn.conf.py run_web:app
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    env_file: .env
    environment:
      DATABASE_URL: postgresql://water_user:${DB_PASSWORD:-changeme}@db:5432/water_dis
      FLASK_ENV: production
    ports:
      - "${WEB_PORT:-5000}:5000"
    volumes:
      - logs:/app/logs

  seed:
    build: .
    command: python seed.py
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://water_user:${DB_PASSWORD:-changeme}@db:5432/water_dis

volumes:
  pgdata:
  bot_persistence:
  logs:
